app-id: org.github.sandwichfarm.nsyte
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: nsyte

finish-args:
  - --share=network
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/mnt
  - --filesystem=/run/media

modules:
  - name: nsyte
    buildsystem: simple
    build-commands:
      - install -Dm755 nsyte-linux /app/bin/nsyte
    sources:
      - type: file
        url: https://github.com/sandwichfarm/nsyte/releases/download/vPLACEHOLDER_VERSION/nsyte-linux-PLACEHOLDER_VERSION
        sha256: PLACEHOLDER_SHA256_LINUX_X86_64
        dest-filename: nsyte-linux
