name: deploy site
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and Deploy Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Set up pnpm
        run: |
          if command -v corepack >/dev/null 2>&1; then
            corepack enable
            corepack prepare pnpm@11.3.0 --activate
          else
            npm install -g pnpm@11.3.0
          fi
      - name: Set up pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "docs/pnpm-lock.yaml"
      - name: Install site dependencies
        run: pnpm --dir docs install --frozen-lockfile
      - name: Build Site
        run: |
          # Build the complete site (splash + VitePress docs)
          ./scripts/build-site.sh

          # Remove root-level .sh file - Bunny.net blocks shell scripts at root
          rm -f dist/install.sh

          # Remove executable permissions from remaining files
          chmod 644 dist/install.txt dist/get/install.sh dist/get/install.txt || true
      - name: Deploy to Bunny
        env:
          BUNNY_STORAGE_ENDPOINT: "https://storage.bunnycdn.com"
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          BUNNY_STORAGE_ZONE: "nsyte"
        run: ./scripts/deploy-bunny-storage.sh ./dist

      # - name: Deploy to Bunny.net CDN
      #   uses: ayeressian/bunnycdn-storage-deploy@v2.2.2
      #   with:
      #     source: "./dist"
      #     destination: ""
      #     storageZoneName: ${{ secrets.BUNNY_STORAGE_ZONE }}
      #     accessKey: ${{ secrets.BUNNY_ACCESS_KEY }}
      #     storagePassword: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
      #     upload: "true"
      #     purgePullZone: "true"

      - name: Purge Bunny.net CDN Cache
        run: |
          curl -X POST "https://api.bunny.net/pullzone/${{ secrets.BUNNY_PULLZONE_ID }}/purgeCache" \
            -H "AccessKey: ${{ secrets.BUNNY_ACCESS_KEY }}" \
            -H "Content-Type: application/json"

      - name: deploy nsite 1
        uses: sandwichfarm/nsite-action@v0.5.1
        id: nsite_deploy
        continue-on-error: true
        timeout-minutes: 15
        with:
          nbunksec: ${{ secrets.NBUNK_SECRET }}
          directory: "./dist" # Your built website directory
          version: "latest"
          relays: |
            wss://relay.primal.net
            wss://nos.lol
            wss://relay.nsite.lol
            wss://relay.nosto.re/
            wss://nsite.run
          servers: |
            https://cdn.hzrd149.com/
            https://nostr.download
            https://nsite.run
            https://blssm.us
          publish_server_list: "true"
          publish_relay_list: "true"
          publish_profile: "true"

      - name: deploy nsite 2
        uses: sandwichfarm/nsite-action@v0.5.1
        id: nsite_deploy2
        continue-on-error: true
        timeout-minutes: 15
        with:
          nbunksec: ${{ secrets.NBUNK_SECRET_MAINTAINER }}
          directory: "./dist" # Your built website directory
          version: "latest"
          name: "nsyte"
          relays: |
            wss://relay.primal.net
            wss://nos.lol
            wss://relay.nsite.lol
            wss://relay.nosto.re/
            wss://nsite.run
          servers: |
            https://cdn.hzrd149.com/
            https://nostr.download
            https://nsite.run
            https://blssm.us
          publish_server_list: "false"
          publish_relay_list: "false"
          publish_profile: "false"

      - name: Summarize nsite deploy
        if: ${{ !cancelled() && (steps.nsite_deploy.outcome != 'skipped' || steps.nsite_deploy2.outcome != 'skipped') }}
        run: |
          nsite1="${{ steps.nsite_deploy.outcome }}"
          nsite2="${{ steps.nsite_deploy2.outcome }}"

          echo "deploy nsite 1 outcome: ${nsite1}"
          echo "deploy nsite 2 outcome: ${nsite2}"

          {
            echo "### nsite deploy"
            echo "- deploy nsite 1: ${nsite1}"
            echo "- deploy nsite 2: ${nsite2}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${nsite1}" != "success" && "${nsite2}" != "success" ]]; then
            echo "::warning::Both nsite deploy attempts failed. Bunny deploy already completed; check NBUNK_SECRET and NBUNK_SECRET_MAINTAINER bunker availability."
          fi
