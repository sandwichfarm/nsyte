app-id: org.github.sandwichfarm.nsyte
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: nsyte

finish-args:
  - --share=network
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/mnt
  - --filesystem=/run/media

modules:
  - name: nsyte
    buildsystem: simple
    build-commands:
      - install -Dm755 nsyte-linux /app/bin/nsyte
    sources:
      - type: file
        url: https://github.com/sandwichfarm/nsyte/releases/download/v0.27.1/nsyte-linux-0.27.1
        sha256: 843dffc50d6e8834b9814fe8c9422736d21ec3a609629fb032f1b250a465a653
        dest-filename: nsyte-linux
