# IMPORTANT: This workflow triggers on "release: published".
# GitHub suppresses this event when releases are created with GITHUB_TOKEN.
# release.yml MUST use secrets.RELEASE_TOKEN (a PAT with "repo" scope) in its
# softprops/action-gh-release step for this workflow to fire. If publish-packages.yml
# never runs after a release, check that release.yml is not using GITHUB_TOKEN for
# the "Create GitHub Release" step. See docs/RELEASING.md for the full setup.

name: publish packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.6.0)"
        required: true
        type: string

jobs:
  setup:
    name: Setup — poll assets and compute checksums
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      sha256_linux_x64: ${{ steps.checksums.outputs.sha256_linux_x64 }}
      sha256_macos_arm64: ${{ steps.checksums.outputs.sha256_macos_arm64 }}
      sha256_macos_x64: ${{ steps.checksums.outputs.sha256_macos_x64 }}
      sha256_windows: ${{ steps.checksums.outputs.sha256_windows }}
    steps:
      - name: Extract version and tag
        id: extract
        env:
          INPUT_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          TAG="${INPUT_TAG}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Poll for release asset readiness
        id: poll
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.extract.outputs.tag }}
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          TAG="${TAG}"
          VERSION="${VERSION}"
          EXPECTED="nsyte-linux-${VERSION} nsyte-macos-arm64-${VERSION} nsyte-macos-x64-${VERSION} nsyte-windows-${VERSION}.exe"
          TIMEOUT=300
          INTERVAL=15
          ELAPSED=0
          ALL_PRESENT=false

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            NAMES=$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null || echo "")
            ALL_PRESENT=true
            for expected in $EXPECTED; do
              if ! echo "$NAMES" | grep -qF "$expected"; then
                ALL_PRESENT=false
                break
              fi
            done
            if [ "$ALL_PRESENT" = "true" ]; then
              echo "All expected assets present after ${ELAPSED}s."
              break
            fi
            echo "Assets not yet complete (${ELAPSED}s elapsed). Waiting ${INTERVAL}s..."
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ALL_PRESENT" != "true" ]; then
            echo "::error::Release assets not available after ${TIMEOUT}s. Aborting."
            exit 1
          fi

      - name: Compute SHA256 checksums
        id: checksums
        env:
          VERSION: ${{ steps.extract.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          BASE="https://github.com/${REPO}/releases/download/v${VERSION}"
          curl -fsSL -o nsyte-linux       "${BASE}/nsyte-linux-${VERSION}"
          curl -fsSL -o nsyte-macos-arm64 "${BASE}/nsyte-macos-arm64-${VERSION}"
          curl -fsSL -o nsyte-macos-x64   "${BASE}/nsyte-macos-x64-${VERSION}"
          curl -fsSL -o nsyte-windows.exe "${BASE}/nsyte-windows-${VERSION}.exe"
          {
            echo "sha256_linux_x64=$(sha256sum nsyte-linux       | awk '{print $1}')"
            echo "sha256_macos_arm64=$(sha256sum nsyte-macos-arm64 | awk '{print $1}')"
            echo "sha256_macos_x64=$(sha256sum nsyte-macos-x64   | awk '{print $1}')"
            echo "sha256_windows=$(sha256sum nsyte-windows.exe   | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"

  publish-aur:
    name: Publish to AUR
    needs: [setup]
    if: needs.setup.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout nsyte repo (for PKGBUILD template)
        uses: actions/checkout@v4

      - name: Set up SSH agent with AUR key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Add AUR host to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR remote
        run: |
          git clone ssh://aur@aur.archlinux.org/nsyte-bin.git /tmp/aur-nsyte-bin
          # Note: "You appear to have cloned an empty repository" on first run is
          # the documented bootstrap path. The first push creates the AUR package.

      - name: Patch PKGBUILD from template
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          SHA256_X86_64: ${{ needs.setup.outputs.sha256_linux_x64 }}
        run: |
          cp packages/aur/PKGBUILD /tmp/aur-nsyte-bin/PKGBUILD
          sed -i "s/PLACEHOLDER_VERSION/${VERSION}/g"             /tmp/aur-nsyte-bin/PKGBUILD
          sed -i "s/PLACEHOLDER_SHA256_X86_64/${SHA256_X86_64}/g" /tmp/aur-nsyte-bin/PKGBUILD
          # Sanity: fail fast if any placeholder survived substitution
          if grep -q "PLACEHOLDER_" /tmp/aur-nsyte-bin/PKGBUILD; then
            echo "::error::PKGBUILD still contains PLACEHOLDER_ markers after substitution."
            grep "PLACEHOLDER_" /tmp/aur-nsyte-bin/PKGBUILD
            exit 1
          fi

      - name: Regenerate .SRCINFO in Arch Linux container
        run: |
          docker run --rm \
            -v /tmp/aur-nsyte-bin:/pkg \
            archlinux:base-devel \
            bash -c '
              set -euo pipefail
              pacman -Sy --noconfirm 2>/dev/null || true
              useradd -m builder
              chown -R builder /pkg
              cd /pkg
              sudo -u builder makepkg --printsrcinfo > .SRCINFO
            '
          # Sanity: ensure .SRCINFO actually landed on the host filesystem
          test -s /tmp/aur-nsyte-bin/.SRCINFO || {
            echo "::error::.SRCINFO was not generated or is empty."
            exit 1
          }

      - name: Commit and push to AUR
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          git -C /tmp/aur-nsyte-bin config user.name "nsyte-bot"
          git -C /tmp/aur-nsyte-bin config user.email "sandwich.farm@protonmail.com"
          git -C /tmp/aur-nsyte-bin add PKGBUILD .SRCINFO
          if git -C /tmp/aur-nsyte-bin diff --cached --quiet; then
            echo "No changes to PKGBUILD/.SRCINFO — AUR already up to date for v${VERSION}. Skipping push."
            exit 0
          fi
          git -C /tmp/aur-nsyte-bin commit -m "chore: update to v${VERSION}"
          git -C /tmp/aur-nsyte-bin push origin master

